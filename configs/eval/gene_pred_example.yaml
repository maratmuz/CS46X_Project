runs:
  run_1:
    model_types:
      - evo2_1b_base
      - evo2_7b_base
      - evo2_40b_base
    eval:
      mode: 'gene_pred'
      num_genes: 50  # Number of genes to evaluate (None for all genes in selected chromosomes)
      samples_per_prompt: 10  # Number of samples per gene
    data:
      format: 'fasta'  # Can be 'fasta' or 'gff3'
      path: 'shared/datasets/TAIR10_genome_release/TAIR10_chromosome_files/TAIR10_chr_all.fas'  # FASTA file path
      gff_path: 'shared/datasets/TAIR10_genome_release/TAIR10_gff3/TAIR10_GFF3_genes.gff'  # GFF3 file path (optional if FASTA embedded in GFF)
      organism_type: 'eukaryote'  # 'prokaryote' (500bp seed) or 'eukaryote' (1000bp seed)
      chromosomes:  # List of chromosomes to evaluate (None for all)
        - 'Chr1'
        # - 'Chr2'
        # - 'Chr3'
        # - 'Chr4'
        # - 'Chr5'
      # Alternative: use a single chromosome as a string
      # chromosomes: 'Chr1'

