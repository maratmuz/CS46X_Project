runs:
  run_1:
    model_types:
      - evo2_1b_base
      - evo2_7b
      - evo2_7b_base
      - evo2_40b
      - evo2_40b_base
    eval:
      mode: 'seq_pred'
      repetitions: 4
      read_mode: 'midpoint'
      seq_pred_tests:
        # Note: Using read_midpoint mode: seq_len is ignored, prompt is 50% of sequence
        test_1:
          seq_len: 0  # Ignored in midpoint mode
          pred_len: 32
        test_2:
          seq_len: 0 
          pred_len: 64
        test_3:
          seq_len: 0  
          pred_len: 128
        test_4: 
          seq_len: 0  
          pred_len: 192
        test_5:
          seq_len: 0  
          pred_len: 256
        test_6:
          seq_len: 0  
          pred_len: 320
        test_7:
          seq_len: 0  
          pred_len: 384
        test_8:
          seq_len: 0  
          pred_len: 448
        test_9:
          seq_len: 0  
          pred_len: 500
    data:
      format: 'fasta'
      path: 'shared/datasets/TAIR10_genome_release/TAIR10_chromosome_files/TAIR10_chr_all.fas'
